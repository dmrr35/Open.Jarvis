[tool.ruff]
target-version = "py311"
line-length = 140
extend-exclude = [
  "__pycache__",
  ".mypy_cache",
  ".ruff_cache",
  "build",
  "dist",
  "logs",
  "release",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disable_error_code = ["import-untyped"]
no_implicit_optional = true

[tool.coverage.run]
omit = [
  "arayuz.py",
  "ui_dialogs.py",
  "ui_onboarding.py",
  "ui_plugin_marketplace.py",
]
